<div id="app">

<style>
/* FORCE FULLSCREEN */
#app{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999999;
font-family:sans-serif;
}

/* REMOVE BLOGGER SPACE */
body{
margin:0 !important;
padding:0 !important;
}

/* BACKGROUND EFFECT */
.bg{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(270deg,#00f0ff,#ff00f0,#000);
background-size:600% 600%;
animation:bg 10s ease infinite;
z-index:-1;
}


@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CENTER BOX */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:350px;
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #00f0ff;
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#222;
color:#fff;
box-sizing:border-box; /* 🔥 VERY IMPORTANT */
font-size:16px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00f0ff,#ff00f0);
color:#000;
font-weight:bold;
}

/* LINK */
.link{
color:#00f0ff;
margin-top:10px;
display:block;
cursor:pointer;
}

.hidden{
display:none;
}


/* LOADER */
#loading{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
display:none;
z-index:10;
}

.loader{
border:5px solid #333;
border-top:5px solid #00f0ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>

<div class="bg"></div>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Sign In</h2>
<input type="text" id="loginEmail" placeholder="Enter Gmail">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
<span class="link" onclick="showSignup()">Create Account</span>
</div>

<!-- SIGNUP -->
<div class="box hidden" id="signupBox">
<h2>Create Account</h2>
<input type="text" id="email" placeholder="Enter Gmail">
<input type="password" id="pass" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">

<label style="color:#aaa;font-size:14px;">
<input type="checkbox" onclick="togglePass()"> Show Password
</label>

<button onclick="signup()">Create Account</button>
<span class="link" onclick="showLogin()">Back to Login</span>
</div>

<!-- LOADING -->
<div id="loading">
<div class="loader"></div>
Processing...
</div>

<script>
function showSignup(){
loginBox.classList.add("hidden");
signupBox.classList.remove("hidden");
}

function showLogin(){
signupBox.classList.add("hidden");
loginBox.classList.remove("hidden");
}

function togglePass(){
pass.type=pass.type==="password"?"text":"password";
confirm.type=confirm.type==="password"?"text":"password";
}

function signup(){
let email=document.getElementById("email").value;
let passVal=document.getElementById("pass").value;
let confirmVal=document.getElementById("confirm").value;

if(!email.includes("@gmail.com")){
alert("Enter valid Gmail");
return;
}
if(passVal!==confirmVal){
alert("Password not match");
return;
}

loading.style.display="flex";

setTimeout(()=>{
localStorage.setItem("user",email);
localStorage.setItem("pass",passVal);

loading.style.display="none";
alert("Account Created ✅");
showLogin();
},3000);
}

function login(){
let email=document.getElementById("loginEmail").value;
let passVal=document.getElementById("loginPass").value;

let u=localStorage.getItem("user");
let p=localStorage.getItem("pass");

if(email===u && passVal===p){
alert("Login Success ✅");

/* 🔥 यहाँ redirect link हाल */
window.location.href="https://your-link.com";

}else{
alert("Wrong details ❌");
}
}
</script>

</div>
