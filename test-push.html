<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Push Notification Test</title>
<style>
  body { background:#111; color:#fff; font-family:monospace; padding:30px; max-width:600px; }
  button { background:#e63946; color:#fff; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-size:1rem; margin:8px 4px; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  pre { background:#1a1a1a; padding:14px; border-radius:8px; font-size:0.8rem; overflow:auto; white-space:pre-wrap; word-break:break-all; }
  .ok  { color:#4ade80; }
  .err { color:#ff6b6b; }
  .info{ color:#60a5fa; }
  h2   { color:#e63946; }
</style>
</head>
<body>
<h2>SUSANTEDIT — Push Notification Test</h2>

<div id="status">Checking support...</div>
<br>

<button id="btnPermission">1. Request Permission</button>
<button id="btnSubscribe" disabled>2. Subscribe</button>
<button id="btnTest" disabled>3. Send Test Push (local)</button>
<button id="btnSendViaServer" disabled>4. Send via Server</button>

<br><br>
<div><strong>Subscription object (copy this for server test):</strong></div>
<pre id="subOutput">—</pre>

<div><strong>Log:</strong></div>
<pre id="log"></pre>

<script>
const VAPID_PUBLIC_KEY = 'BC0aVvtFuNuRxkyyVe0pr4RF0KCPSfLPOAIDvACYWZUABJz3k1qiUAKxxir7i1iJg9nrVUawyrWHRzfmrd14iBU';
const SERVER = 'http://localhost:3000';

let swReg = null;
let subscription = null;

function log(msg, cls = '') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${new Date().toLocaleTimeString()} — ${msg}</span>\n`;
}

function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const b = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// ── Check support ──────────────────────────────────────────────────────────
const supported = 'serviceWorker' in navigator && 'PushManager' in navigator && 'Notification' in window;
document.getElementById('status').innerHTML = supported
  ? '<span class="ok">Browser supports push notifications</span>'
  : '<span class="err">Push NOT supported in this browser</span>';

log('Permission: ' + Notification.permission, Notification.permission === 'granted' ? 'ok' : 'info');

// ── Step 1: Permission ─────────────────────────────────────────────────────
document.getElementById('btnPermission').onclick = async () => {
  const p = await Notification.requestPermission();
  log('Permission result: ' + p, p === 'granted' ? 'ok' : 'err');
  if (p === 'granted') document.getElementById('btnSubscribe').disabled = false;
};

if (Notification.permission === 'granted') {
  document.getElementById('btnSubscribe').disabled = false;
}

// ── Step 2: Subscribe ──────────────────────────────────────────────────────
document.getElementById('btnSubscribe').onclick = async () => {
  try {
    log('Registering service worker...', 'info');
    swReg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    await navigator.serviceWorker.ready;
    log('SW registered', 'ok');

    log('Subscribing to push...', 'info');
    subscription = await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });

    const sub = subscription.toJSON();
    document.getElementById('subOutput').textContent = JSON.stringify(sub, null, 2);
    log('Subscribed! endpoint: ' + sub.endpoint.slice(0, 60) + '...', 'ok');
    document.getElementById('btnTest').disabled = false;
    document.getElementById('btnSendViaServer').disabled = false;
  } catch (e) {
    log('Subscribe failed: ' + e.message, 'err');
  }
};

// ── Step 3: Test push locally (SW shows notification directly) ─────────────
document.getElementById('btnTest').onclick = async () => {
  try {
    log('Showing local test notification...', 'info');
    await swReg.showNotification('Test Notification', {
      body: 'This is a local test — SW is working!',
      icon: '/logo.png',
      badge: '/logo.png',
      vibrate: [200, 100, 200],
      data: { url: '/dashboard' },
    });
    log('Local notification shown', 'ok');
  } catch (e) {
    log('Local test failed: ' + e.message, 'err');
  }
};

// ── Step 4: Send via server ────────────────────────────────────────────────
document.getElementById('btnSendViaServer').onclick = async () => {
  try {
    log('Sending push via server...', 'info');
    const sub = subscription.toJSON();
    const res = await fetch(`${SERVER}/api/push/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        subscription: { endpoint: sub.endpoint, keys: sub.keys },
        title: 'Server Push Test',
        body: 'This came from your Render/local server via Web Push!',
      }),
    });
    const data = await res.json();
    if (data.ok) log('Server push sent successfully!', 'ok');
    else log('Server error: ' + data.message, 'err');
  } catch (e) {
    log('Server push failed: ' + e.message, 'err');
  }
};
</script>
</body>
</html>
